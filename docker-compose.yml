# FerrERP - Docker Compose (Producción)
#
# Servicios:
#   web     - Aplicación Flask (gunicorn)
#   db      - PostgreSQL 15
#   nginx   - Reverse proxy + servidor de landing
#   certbot - Certificados SSL (Let's Encrypt)
#
# Uso:
#   docker-compose up -d

services:
  # Aplicacion Flask
  web:
    build: .
    container_name: ferrerp_web
    expose:
      - "5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-cambiar-en-produccion}
      - DATABASE_URL=postgresql://ferrerp:${DB_PASSWORD:-ferrerp123}@db:5432/ferrerp
      - APP_NAME=FerrERP
    volumes:
      - app_static:/app/app/static
      - uploads_data:/app/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ferrerp_network

  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: ferrerp_db
    command: postgres -c shared_preload_libraries=pg_stat_statements
    environment:
      - POSTGRES_USER=ferrerp
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ferrerp123}
      - POSTGRES_DB=ferrerp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrerp -d ferrerp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ferrerp_network

  # Nginx - reverse proxy y servidor de landing
  nginx:
    image: nginx:1.25-alpine
    container_name: ferrerp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./landing:/var/www/landing:ro
      - app_static:/app/static:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - ferrerp_network

  # Certbot para SSL/TLS (Let's Encrypt)
  certbot:
    image: certbot/certbot:latest
    container_name: ferrerp_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:
  app_static:
  uploads_data:
  certbot_webroot:
  certbot_certs:

networks:
  ferrerp_network:
    driver: bridge
