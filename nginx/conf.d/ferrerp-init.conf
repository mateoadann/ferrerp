# FerrERP - Configuración temporal (HTTP) para emitir certificados SSL
#
# Uso:
#   1. Copiar este archivo como la config activa:
#      cp nginx/conf.d/ferrerp-init.conf nginx/conf.d/active.conf
#   2. Levantar nginx: docker-compose up -d nginx certbot
#   3. Emitir certificado:
#      docker-compose exec certbot certbot certonly \
#        --webroot --webroot-path /var/www/certbot \
#        --email admin@ferrerp.com --agree-tos --no-eff-email \
#        -d ferrerp.com -d www.ferrerp.com -d app.ferrerp.com
#   4. Reemplazar por la config definitiva:
#      cp nginx/conf.d/ferrerp.conf nginx/conf.d/active.conf
#   5. Reiniciar: docker-compose restart nginx
#   6. Levantar el resto: docker-compose up -d

server {
    listen 80;
    listen [::]:80;
    server_name ferrerp.com www.ferrerp.com app.ferrerp.com;

    # Challenge de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'FerrERP - Esperando configuracion SSL...';
        add_header Content-Type text/plain;
    }
}
