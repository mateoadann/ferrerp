# FerrERP - Configuración nginx de producción (HTTPS)
#
# Dominios:
#   ferrerp.app / www.ferrerp.app    → Landing page (archivos estáticos)
#   panel.ferrerp.app                → Aplicación Flask (proxy a gunicorn)

# --- Redirección HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name ferrerp.app www.ferrerp.app panel.ferrerp.app;

    # Permitir challenge de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Landing page: ferrerp.app ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ferrerp.app www.ferrerp.app;

    ssl_certificate     /etc/letsencrypt/live/ferrerp.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferrerp.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(css|js|png|jpg|jpeg|svg|mp4|webm|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# --- Aplicación Flask: panel.ferrerp.app ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name panel.ferrerp.app;

    ssl_certificate     /etc/letsencrypt/live/ferrerp.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferrerp.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy hacia Flask/gunicorn
    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # Archivos estáticos de Flask servidos directamente por nginx
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
