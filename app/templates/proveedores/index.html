{% extends 'base.html' %}
{% block title %}Proveedores - {{ app_name }}{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Proveedores</h2>
    <a href="{{ url_for('proveedores.nuevo') }}" class="btn btn-primary">
        <span class="material-symbols-rounded me-2">add</span>Nuevo Proveedor
    </a>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form class="filter-bar">
            <div class="search-bar flex-grow-1" style="max-width: 400px;">
                <span class="material-symbols-rounded">search</span>
                <input type="text" name="q" class="form-control" placeholder="Buscar proveedor..." value="{{ busqueda }}">
            </div>
            <div class="form-check">
                <input type="checkbox" class="form-check-input" name="activos" value="1" id="activos" {% if solo_activos %}checked{% endif %}>
                <label class="form-check-label" for="activos">Solo activos</label>
            </div>
            <button type="submit" class="btn btn-secondary">Filtrar</button>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0" id="tabla-proveedores">
        {% include 'proveedores/_tabla.html' %}
    </div>
</div>
{% endblock %}
