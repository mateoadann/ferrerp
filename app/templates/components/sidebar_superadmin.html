<aside class="sidebar">
    <!-- Logo -->
    <div class="sidebar-header">
        <div class="logo-icon">F</div>
        <span class="logo-text">FerrERP</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <a href="{{ url_for('superadmin.index') }}"
           class="nav-item {% if request.endpoint == 'superadmin.index' %}active{% endif %}">
            <span class="material-symbols-rounded">admin_panel_settings</span>
            <span>Dashboard</span>
        </a>

        <a href="{{ url_for('superadmin.empresas') }}"
           class="nav-item {% if request.endpoint and request.endpoint.startswith('superadmin.empresas') %}active{% endif %}">
            <span class="material-symbols-rounded">business</span>
            <span>Empresas</span>
        </a>
    </nav>

    <!-- User Section -->
    <div class="sidebar-footer">
        <div class="user-avatar">{{ current_user.iniciales }}</div>
        <div class="user-info">
            <span class="user-name">{{ current_user.nombre }}</span>
            <span class="user-role">Superadmin</span>
        </div>
    </div>
</aside>
