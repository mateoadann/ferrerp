<!-- Modal de Cumpleaños del Día -->
<div class="modal fade" id="modalCumpleanos" tabindex="-1"
     aria-labelledby="modalCumpleanosLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title mb-0" id="modalCumpleanosLabel">
                    <span class="material-symbols-rounded me-2">cake</span>
                    Cumpleaños de hoy
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
            </div>
            <div class="modal-body" id="modalCumpleanosBody">
                <div class="text-center py-3">
                    <div class="spinner-border text-info" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary"
                        data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
